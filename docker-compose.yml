version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smart-doc-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_doc
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./smart-doc-database/smart-doc-database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./smart-doc-backend
    container_name: smart-doc-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: smart_doc
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-docker}
      SECRET_KEY: ${SECRET_KEY:-secret-docker}
      CORS_ORIGINS: http://localhost:80
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./smart-doc-frontend
    container_name: smart-doc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data: